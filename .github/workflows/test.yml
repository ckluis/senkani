name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    # macos-15 ships Xcode 16.4 / Swift 6.1.2 by default. The project
    # is developed against Swift 6.3 — 6.1's stricter actor-isolation
    # enforcement flagged dozens of legitimate-on-6.3 sites. Pinning
    # the runner toolchain to 6.3 (Bach: "match the local environment")
    # closes that gap without retrofitting hundreds of source sites.
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SwiftyLab/setup-swift is the actively maintained successor to
      # swift-actions/setup-swift (the latter's version registry stops at
      # ~6.0 — `swift-version: "6.3"` returned "not available" in
      # iteration #4). SwiftyLab tracks current swift.org releases.
      - name: Install Swift 6.3
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Retries cover the known `swiftpm-testing-helper` SIGTRAP flake
      # documented in spec/testing.md (line 458, deferred-issue list).
      # Build is SwiftPM-cached after attempt 1, so retries cost only
      # the test execution (~30s), not a fresh build.
      - name: Build & test (deterministic harness, retry on flake)
        run: |
          for attempt in 1 2 3; do
            echo "::group::Test attempt $attempt of 3"
            if ./tools/test-safe.sh; then
              echo "::endgroup::"
              echo "Tests passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Test attempt $attempt failed — retrying (likely swiftpm-testing-helper SIGTRAP, see spec/testing.md)"
          done
          echo "::error::Tests failed on all 3 attempts — not a transient flake"
          exit 1
