name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    # macos-15 ships Xcode 16.4 / Swift 6.1.2 by default. The project
    # is developed against Swift 6.3 — 6.1's stricter actor-isolation
    # enforcement flagged dozens of legitimate-on-6.3 sites. Pinning
    # the runner toolchain to 6.3 (Bach: "match the local environment")
    # closes that gap without retrofitting hundreds of source sites.
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SwiftyLab/setup-swift is the actively maintained successor to
      # swift-actions/setup-swift (the latter's version registry stops at
      # ~6.0 — `swift-version: "6.3"` returned "not available" in
      # iteration #4). SwiftyLab tracks current swift.org releases.
      - name: Install Swift 6.3
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # tools/test-safe.sh now runs the suite in named chunks, each a
      # separate `swiftpm-testing-helper` invocation. A SIGTRAP in one
      # chunk fails only that chunk; the rest still produce signal.
      # Per-chunk retry-on-flake (3×) lives inside the script — the
      # outer retry loop the prior workflow used is gone, since the
      # chunked harness already covers the same flake envelope without
      # paying for a full re-run on every retry.
      - name: Build & test (chunked harness)
        run: ./tools/test-safe.sh

      # Diagnostic surface: print the chunk regex table in the run log
      # so reviewers reading a failed run can see what's in each chunk
      # without reading the script source.
      - name: Chunk inventory (for log archaeology)
        if: always()
        run: ./tools/test-safe.sh --list-chunks
