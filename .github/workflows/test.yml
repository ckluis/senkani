name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    # macos-15 ships Xcode 16 / Swift 6 by default; macos-14 defaults
    # to Xcode 15.4 / Swift 5.10, which predates `swift test --no-parallel`
    # (added in Swift 6) and does not match Package.swift's
    # `swift-tools-version: 6.0`.
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build & test (deterministic harness)
        run: ./tools/test-safe.sh
